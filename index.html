<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#146c5f">
    <meta name="description" content="A local-first panic attack log for tracking patterns to discuss in therapy.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
    <title>Anxiety Checker</title>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Local panic attack log</p>
        <h1>Anxiety Checker</h1>
      </div>
      <button class="icon-button" id="installButton" type="button" hidden aria-label="Install app" title="Install app">
        <span aria-hidden="true">+</span>
      </button>
    </header>

    <nav class="tabs" aria-label="Main views">
      <button class="tab is-active" type="button" data-view="entry">New</button>
      <button class="tab" type="button" data-view="records">Records</button>
      <button class="tab" type="button" data-view="backup">Backup</button>
    </nav>

    <main>
      <section class="view is-active" id="entryView" aria-labelledby="entryTitle">
        <div class="section-head">
          <h2 id="entryTitle">New episode</h2>
          <p>This is for tracking patterns to discuss in therapy, not for self-diagnosis.</p>
        </div>
        <form id="episodeForm" autocomplete="off"></form>
      </section>

      <section class="view" id="recordsView" aria-labelledby="recordsTitle">
        <div class="section-head">
          <h2 id="recordsTitle">Records</h2>
          <p id="recordCount">No entries yet.</p>
        </div>
        <div class="summary-grid" id="summaryGrid"></div>
        <div class="record-list" id="recordList"></div>
      </section>

      <section class="view" id="backupView" aria-labelledby="backupTitle">
        <div class="section-head">
          <h2 id="backupTitle">Backup</h2>
          <p>Export before clearing browser data or changing phones.</p>
        </div>

        <div class="tool-panel">
          <button class="primary" id="exportCsvButton" type="button">Export CSV</button>
          <button id="exportJsonButton" type="button">Export JSON</button>
          <label class="file-action">
            Import CSV or JSON
            <input id="importFile" type="file" accept=".csv,text/csv,.json,application/json">
          </label>
        </div>

        <div class="danger-zone">
          <h3>Local data</h3>
          <p>Entries are stored only on this device in this browser.</p>
          <button class="danger" id="clearDataButton" type="button">Delete all entries</button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js" defer></script>
  </body>
</html>
